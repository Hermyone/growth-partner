# growth-partner/docker-compose.yml
# 成长伙伴 —— 容器编排文件
# 兼容：Mac (Docker Desktop / OrbStack) + Windows (Docker Desktop + WSL2)
# 使用方式：docker compose up -d

version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 数据库服务
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-growth_partner}
      POSTGRES_USER: ${POSTGRES_USER:-gp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gp_secret_2025}
      # 设置时区为中国标准时间
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      # 数据持久化卷（本地目录，确保数据不会丢失）
      - ./data/postgres:/var/lib/postgresql/data
      # 初始化脚本（只在数据卷为空时执行一次）
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gp_user} -d ${POSTGRES_DB:-growth_partner}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gp_network

  # ─────────────────────────────────────────────────────────────
  # Redis 缓存 + Pub/Sub 服务
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-gp_redis_2025}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      # 数据持久化卷（本地目录，确保数据不会丢失）
      - ./data/redis:/data
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-gp_redis_2025}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gp_network

  # ─────────────────────────────────────────────────────────────
  # Go 后端 API 服务
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development  # 开发模式使用热重载
    container_name: gp_backend
    restart: unless-stopped
    environment:
      # 应用配置
      APP_ENV: development
      APP_PORT: 8080
      APP_JWT_SECRET: ${JWT_SECRET:-growth_partner_jwt_secret_2025_change_in_prod}
      APP_AES_KEY: ${AES_KEY:-01234567890123456789012345678901}
      TZ: Asia/Shanghai
      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-growth_partner}
      DB_USER: ${POSTGRES_USER:-gp_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gp_secret_2025}
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: 25
      DB_MAX_IDLE_CONNS: 5
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-gp_redis_2025}
      REDIS_DB: 0
    ports:
      - "8080:8080"
      # 调试端口（仅开发模式）
      - "2345:2345"
    volumes:
      # 挂载源代码以支持热重载（air watch）
      # 注意：使用 Docker 管理卷路径，避免 Mac/Windows 路径差异
      - ./backend:/app
      # Go module 缓存，避免每次重建都重新下载依赖
      - go_module_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gp_network
    # air 热重载工具，Mac/Windows 均支持
    command: ["air", "-c", ".air.toml"]

# ─────────────────────────────────────────────────────────────
# 数据卷定义（使用 Docker 命名卷，完全跨平台兼容）
# ─────────────────────────────────────────────────────────────
volumes:
  go_module_cache:
    driver: local
  go_build_cache:
    driver: local

# ─────────────────────────────────────────────────────────────
# 网络定义
# ─────────────────────────────────────────────────────────────
networks:
  gp_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16